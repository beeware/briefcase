
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      # Check for updates on Sunday, 8PM UTC
      interval: "weekly"
      day: "sunday"
      time: "20:00"
    cooldown:
      default-days: 7

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      # Check for updates on Sunday, 8PM UTC
      interval: "weekly"
      day: "sunday"
      time: "20:00"
    cooldown:
      default-days: 7

  - package-ecosystem: "pip"
    directory: "automation"
    schedule:
      # Check for updates on Sunday, 8PM UTC
      interval: "weekly"
      day: "sunday"
      time: "20:00"
    cooldown:
      default-days: 7

  - package-ecosystem: "pip"
    directory: "debugger"
    schedule:
      # Check for updates on Sunday, 8PM UTC
      interval: "weekly"
      day: "sunday"
      time: "20:00"
    cooldown:
      default-days: 7

  - package-ecosystem: "pre-commit"
    directory: "/"
    schedule:
      # Check for updates on Sunday, 8PM UTC
      interval: "weekly"
      day: "sunday"
      time: "20:00"
    cooldown:
      default-days: 7
